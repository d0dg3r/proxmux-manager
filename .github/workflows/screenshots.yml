name: Generate Store Screenshots
on:
  workflow_dispatch:
  push:
    paths:
      - 'store/mock/**'
      - 'store/generate_screenshots_ci.js'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        
      - name: Generate Screenshots
        run: node store/generate_screenshots_ci.js
        
      - name: Create pull request for screenshots
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update store screenshots [skip ci]"
          title: "chore: update store screenshots"
          body: "This pull request was automatically generated by the **Generate Store Screenshots** workflow to update promotional assets."
          branch: "chore/update-screenshots"
          add-paths: |
            store/*.png
            store/*.jpg
