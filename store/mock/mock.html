<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROXMUX Mock</title>
    <link rel="stylesheet" href="popup.css">
    <style>
        :root {
            --bg-page-light: #f0f2f5;
            --bg-page-dark: #0f111a;
        }
        body { 
            width: 1280px; 
            height: 800px; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background-color: var(--bg-page-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: var(--bg-page-dark); }
        }
        #extension-wrapper {
            width: 550px;
            height: 600px;
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }
        .overlay { display: none !important; }
        #resource-list { display: flex !important; }
        /* Ensure the extension content fills the wrapper */
        header { border-radius: 0; }
    </style>
</head>
<body id="mock-body">
    <div id="extension-wrapper">
        <div class="top-bar">
            <header>
                <div class="logo-container">
                    <img src="icon48.png" alt="Logo" class="logo">
                    <h1 class="branded-title"><span class="prox">PROX</span><span class="mux">MUX</span></h1>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M9,2c-1.05,0-2.05,0.16-3,0.46c4.06,1.27,7,5.06,7,9.54s-2.94,8.27-7,9.54C6.95,21.84,7.95,22,9,22c5.52,0,10-4.48,10-10S14.52,2,9,2z"/></svg>
                    </button>
                    <button id="refresh-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
                    </button>
                    <button id="sidepanel-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M19,19H5V5H19V19M17,17H12V7H17V17Z"/></svg>
                    </button>
                    <button id="settings-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.53,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.47,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                    </button>
                </div>
            </header>

            <div class="search-container">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                    <input type="text" id="search-input" placeholder="Search resources...">
                </div>
                <div class="filter-bar">
                    <button class="filter-pill active">All</button>
                    <button class="filter-pill">Node</button>
                    <button class="filter-pill">VM</button>
                    <button class="filter-pill">LXC</button>
                    <div class="filter-divider"></div>
                    <button class="filter-pill">Online</button>
                    <button class="filter-pill">Offline</button>
                </div>
                <div id="tag-filters" class="tag-filters-container">
                    <button class="tag-filter-pill active">prod</button>
                    <button class="tag-filter-pill">web</button>
                    <button class="tag-filter-pill">db</button>
                    <button class="tag-filter-pill">backup</button>
                </div>
            </div>
        </div>

        <main>
            <div id="resource-list" class="list">
                <div class="resource-item">
                    <div class="status-indicator status-running"></div>
                    <div class="info">
                        <span class="name">pve-node-01</span>
                        <div class="resource-subtitle">
                            <span class="node">NODE @ pve-node-01</span>
                            <span class="uptime">152d 4h</span>
                        </div>
                        <div class="meta-tags"><span class="tag ip">192.168.1.10</span></div>
                    </div>
                    <div class="actions"><button class="action-btn shell">Shell</button><button class="action-btn ssh">SSH</button></div>
                </div>
                <div class="resource-item">
                    <div class="status-indicator status-running"></div>
                    <div class="info">
                        <span class="name">Ubuntu-Server-22.04</span>
                        <div class="resource-subtitle">
                            <span class="node">QEMU @ pve-node-01 (ID 101)</span>
                            <span class="uptime">14d 2h</span>
                        </div>
                        <div class="meta-tags">
                            <span class="tag os">ubuntu</span>
                            <span class="tag ip">192.168.1.50</span>
                        </div>
                        <div class="user-tags">
                            <span class="tag-pill">prod</span>
                            <span class="tag-pill">web</span>
                        </div>
                    </div>
                    <div class="actions"><button class="action-btn novnc">noVNC</button><button class="action-btn ssh">SSH</button></div>
                </div>
                <div class="resource-item">
                    <div class="status-indicator status-running"></div>
                    <div class="info">
                        <span class="name">Windows-11-Desktop</span>
                        <div class="resource-subtitle">
                            <span class="node">QEMU @ pve-node-01 (ID 102)</span>
                            <span class="uptime">3h 45m</span>
                        </div>
                        <div class="meta-tags">
                            <span class="tag os">windows</span>
                            <span class="tag ip">192.168.1.55</span>
                        </div>
                        <div class="user-tags">
                            <span class="tag-pill">remote</span>
                        </div>
                    </div>
                    <div class="actions"><button class="action-btn novnc">noVNC</button><button class="action-btn spice">SPICE</button></div>
                </div>
                <div class="resource-item">
                    <div class="status-indicator status-stopped"></div>
                    <div class="info">
                        <span class="name">nextcloud-ai</span>
                        <div class="resource-subtitle">
                            <span class="node">LXC @ pve-node-01 (ID 201)</span>
                        </div>
                        <div class="meta-tags"><span class="tag os">debian</span></div>
                        <div class="user-tags">
                            <span class="tag-pill">backup</span>
                        </div>
                    </div>
                    <div class="actions"><button class="action-btn novnc">noVNC</button></div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
