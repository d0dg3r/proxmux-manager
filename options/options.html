<!DOCTYPE html>
<html>
<head>
    <title>PROXMUX Options</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="../icons/icon48.png" alt="Logo" class="logo">
            <h1 class="branded-title">
                <span class="prox">PROX</span><span class="mux">MUX</span>
                <span class="title-suffix" data-i18n="settings">Settings</span>
            </h1>
        </header>
        
        <div class="card">
            <div class="form-group">
                <label for="proxmox-url" data-i18n="proxmoxUrl">Proxmox URL</label>
                <input type="text" id="proxmox-url" placeholder="https://192.168.1.100:8006">
                <small>The primary URL of your Proxmox cluster.</small>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="api-user" data-i18n="apiUser">User & Realm</label>
                    <input type="text" id="api-user" placeholder="root@pam">
                </div>
                <div class="form-group">
                    <label for="api-tokenid" data-i18n="apiTokenId">Token ID</label>
                    <input type="text" id="api-tokenid" placeholder="automation">
                </div>
            </div>

            <div class="form-group">
                <label for="api-secret" data-i18n="apiSecret">API Secret</label>
                <div class="input-with-icon">
                    <input type="password" id="api-secret" placeholder="Secret Value">
                    <button id="toggle-secret" class="icon-btn">
                        <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg>
                    </button>
                </div>
            </div>

            <button id="save-settings-btn" class="primary-btn" data-i18n="saveSettings">Save Settings</button>
            <div id="status"></div>
        </div>
        
        <div class="info-card">
            <h3>Configuration Tip</h3>
            <p>Ensure your API Token has at least `VM.Console` and `Sys.Audit` permissions. For SPICE support, `VM.Config.Options` or `PVEVMAdmin` is recommended.</p>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
