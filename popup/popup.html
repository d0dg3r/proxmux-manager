<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PROXMUX Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="top-bar">
        <header>
            <div class="logo-container">
                <img src="../icons/icon48.png" alt="Logo" class="logo">
                <h1 class="branded-title">
                    <span class="prox">PROX</span><span class="mux">MUX</span>
                </h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle-btn" title="Toggle Theme">
                    <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M9,2c-1.05,0-2.05,0.16-3,0.46c4.06,1.27,7,5.06,7,9.54s-2.94,8.27-7,9.54C6.95,21.84,7.95,22,9,22c5.52,0,10-4.48,10-10S14.52,2,9,2z"/></svg>
                </button>
                <button id="refresh-btn" title="Refresh List">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
                </button>
                <button id="display-settings-btn" data-i18n-title="displaySettings" title="Display Settings">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.97 21.68,8.76L19.68,5.29C19.58,5.08 19.33,4.97 19.11,5.05L16.62,6.05C16.1,5.65 15.55,5.32 14.95,5.07L14.59,2.42C14.53,2.18 14.33,2 14.07,2H10.07C9.83,2 9.63,2.18 9.59,2.42L9.23,5.07C8.63,5.32 8.08,5.65 7.56,6.05L5.07,5.05C4.85,4.97 4.6,5.08 4.5,5.29L2.5,8.76C2.38,8.97 2.44,9.22 2.63,9.37L4.74,11.03C4.7,11.34 4.68,11.67 4.68,12C4.68,12.33 4.7,12.65 4.74,12.97L2.63,14.63C2.44,14.78 2.38,15.03 2.5,15.24L4.5,18.71C4.6,18.92 4.85,19.03 5.07,18.95L7.56,17.95C8.08,18.35 8.63,18.68 9.23,18.93L9.59,21.58C9.63,21.82 9.83,22 10.07,22H14.07C14.33,22 14.53,21.82 14.59,21.58L14.95,18.93C15.55,18.68 16.1,18.35 16.62,17.95L19.11,18.95C19.33,19.03 19.58,18.92 19.68,18.71L21.68,15.24C21.78,15.03 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                </button>
                <button id="sidepanel-btn" title="Open Side Panel">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M19,19H5V5H19V19M17,17H12V7H17V17Z"/></svg>
                </button>
            </div>
        </header>
        <div class="search-container">
                <div class="search-wrapper">
                    <div class="search-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5,14h-0.79l-0.28-0.27C15.41,12.59,16,11.11,16,9.5C16,5.91,13.09,3,9.5,3S3,5.91,3,9.5S5.91,16,9.5,16c1.61,0,3.09-0.59,4.23-1.57l0.27,0.28v0.79l5,4.99L20.49,19L15.5,14z M9.5,14C7.01,14,5,11.99,5,9.5S7.01,5,9.5,5S14,7.01,14,9.5S11.99,14,9.5,14z"/></svg>
                    </div>
                    <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Search nodes, VMs, LXC, IPs or tags...">
                    <button id="search-clear-btn" class="search-clear-btn hidden" title="Clear search" aria-label="Clear search">
                        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M18.3,5.71L12,12L5.71,5.71L4.29,7.12L10.59,13.41L4.29,19.71L5.71,21.12L12,14.83L18.3,21.12L19.71,19.71L13.41,13.41L19.71,7.12L18.3,5.71Z"/></svg>
                    </button>
                </div>
                <button id="filter-toggle-btn" class="icon-btn" data-i18n-title="filterToggle" title="Toggle Filters">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M10,18h4v-2h-4V18z M3,6v2h18V6H3z M6,13h12v-2H6V13z"/></svg>
                </button>
            </div>
            
            <div id="collapsible-filters" class="collapsible-filters collapsed">
                <div class="filters-inner">
                    <div class="filter-bar">
                        <button class="filter-pill active" data-i18n="filterAll" data-filter-type="all">All</button>
                        <button class="filter-pill" data-i18n="filterNode" data-filter-type="node">Node</button>
                        <button class="filter-pill" data-i18n="filterVM" data-filter-type="qemu">VM</button>
                        <button class="filter-pill" data-i18n="filterLXC" data-filter-type="lxc">LXC</button>
                        <div class="filter-divider"></div>
                        <button class="filter-pill" data-i18n="filterRunning" data-filter-status="running">Online</button>
                        <button class="filter-pill" data-i18n="filterStopped" data-filter-status="stopped">Offline</button>
                    </div>
                    <div id="tag-filters" class="tag-filters-container hidden"></div>
                </div>
            </div>

            <div id="display-settings-menu" class="display-settings-menu hidden">
                <div class="settings-header">
                    <span data-i18n="displaySettings">Display Settings</span>
                </div>
                <div class="settings-grid">
                    <label class="setting-item">
                        <input type="checkbox" id="show-uptime" checked>
                        <span data-i18n="showUptime">Uptime</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" id="show-ip" checked>
                        <span data-i18n="showIP">IP Address</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" id="show-os" checked>
                        <span data-i18n="showOS">OS Info</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" id="show-vmid" checked>
                        <span data-i18n="showID">IDs (VMID)</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" id="show-tags" checked>
                        <span data-i18n="showTags">Tags</span>
                    </label>
                </div>
                <div class="settings-footer">
                    <button id="settings-btn" class="text-btn">
                        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.97 21.68,8.76L19.68,5.29C19.58,5.08 19.33,4.97 19.11,5.05L16.62,6.05C16.1,5.65 15.55,5.32 14.95,5.07L14.59,2.42C14.53,2.18 14.33,2 14.07,2H10.07C9.83,2 9.63,2.18 9.59,2.42L9.23,5.07C8.63,5.32 8.08,5.65 7.56,6.05L5.07,5.05C4.85,4.97 4.6,5.08 4.5,5.29L2.5,8.76C2.38,8.97 2.44,9.22 2.63,9.37L4.74,11.03C4.7,11.34 4.68,11.67 4.68,12C4.68,12.33 4.7,12.65 4.74,12.97L2.63,14.63C2.44,14.78 2.38,15.03 2.5,15.24L4.5,18.71C4.6,18.92 4.85,19.03 5.07,18.95L7.56,17.95C8.08,18.35 8.63,18.68 9.23,18.93L9.59,21.58C9.63,21.82 9.83,22 10.07,22H14.07C14.33,22 14.53,21.82 14.59,21.58L14.95,18.93C15.55,18.68 16.1,18.35 16.62,17.95L19.11,18.95C19.33,19.03 19.58,18.92 19.68,18.71L21.68,15.24C21.78,15.03 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                        <span data-i18n="openFullSettings">Full Settings</span>
                    </button>
                </div>
            </div>

            <div id="debug-status" style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; font-style: italic; display: none;"></div>
        </div>

        <!-- Alert Section (New) -->
        <div id="header-alerts">
            <!-- Not Authenticated State -->
            <div id="no-auth" class="header-alert hidden">
                <p data-i18n="noAuthDesc">Please configure your API credentials.</p>
                <div class="header-alert-actions">
                    <button id="open-settings-overlay" class="compact-btn primary" data-i18n="openSettings">Settings</button>
                </div>
            </div>

            <!-- Session Expired State -->
            <div id="session-error" class="header-alert hidden">
                <p data-i18n="sessionExpiredDesc">Session expired. Please log in to Proxmox.</p>
                <div class="header-alert-actions">
                    <button id="login-btn" class="compact-btn primary" data-i18n="loginNow">Log in</button>
                    <button id="close-session-error" class="compact-btn" data-i18n="close">Close</button>
                </div>
            </div>
        </div>
    
    <main>
        <!-- Loading State -->
        <div id="loading" class="overlay">
            <div class="spinner"></div>
            <p data-i18n="connecting">Connecting...</p>
        </div>

        <div id="resource-list" class="list">
            <!-- Resources will be injected here -->
        </div>


        <!-- No more modal, we use options page instead -->
    </main>

    <template id="resource-item-template">
        <div class="resource-item">
            <div class="item-main">
                <div class="status-indicator"></div>
                <div class="info">
                    <span class="name"></span>
                    <div class="resource-subtitle">
                        <span class="type-node"></span>
                        <span class="node-id"></span>
                        <span class="uptime hidden"></span>
                    </div>
                    <div class="meta-tags">
                        <span class="tag os hidden"></span>
                        <span class="tag ip hidden"></span>
                    </div>
                    <div class="user-tags hidden"></div>
                </div>
                <div class="actions">
                    <button class="action-btn novnc" title="Open noVNC Console">noVNC</button>
                    <button class="action-btn spice hidden" title="Download SPICE .vv file">SPICE</button>
                    <button class="action-btn ssh hidden" title="Connect via SSH">SSH</button>
                    <button class="action-btn shell hidden" title="Open Shell">Shell</button>
                </div>
            </div>
            <div class="details-drawer">
                <div class="drawer-inner">
                    <!-- Node specific stats -->
                    <div class="stat-row node-only hidden" id="load-row">
                        <span class="stat-label">
                            <svg class="stat-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M13,3H11V7H13V3M4.5,14V12H1.5V14H4.5M6.36,5.64L4.95,7.05L7.78,9.88L9.19,8.47L6.36,5.64M14.81,8.47L16.22,9.88L19.05,7.05L17.64,5.64L14.81,8.47M22.5,12V14H19.5V12H22.5M16.22,14.12L14.81,15.53L17.64,18.36L19.05,16.95L16.22,14.12M6.36,18.36L7.78,16.95L4.95,14.12L3.54,15.53L6.36,18.36M12,19V22H14V19H12M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9Z"/></svg>
                            LOAD
                        </span>
                        <div class="progress-spacer"></div>
                        <span class="stat-value load-value">-</span>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">
                            <svg class="stat-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12,11A1,1 0 1,0 11,10A1,1 0 0,0 12,11M14,13A1,1 0 1,0 13,12A1,1 0 0,0 14,13M10,13A1,1 0 1,0 9,12A1,1 0 0,0 10,13M12,5A1,1 0 1,0 11,4A1,1 0 0,0 12,5M16,5A1,1 0 1,0 15,4A1,1 0 0,0 16,5M8,5A1,1 0 1,0 7,4A1,1 0 0,0 8,5M21,2H3A1,1 0 0,0 2,3V21A1,1 0 0,0 3,22H21A1,1 0 0,0 22,21V3A1,1 0 0,0 21,2M20,17H13.6L12.7,18.5C12.4,19 11.6,19 11.3,18.5L10.4,17H4V6H20V17Z"/></svg>
                            CPU
                        </span>
                        <div class="progress-container">
                            <div class="progress-bar cpu-bar"></div>
                        </div>
                        <span class="stat-value cpu-value">0%</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">
                            <svg class="stat-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M17,17H7V7H17M21,11V9H19V7C19,5.89 18.1,5 17,5H15V3H13V5H11V3H9V5H7C5.89,5 5,5.89 5,7V9H3V11H5V13H3V15H5V17C5,18.1 5.89,19 7,19H9V21H11V19H13V21H15V19H17C18.1,19 19,18.1 19,17V15H21V13H19V11M13,13H11V11H13V13Z"/></svg>
                            RAM
                        </span>
                        <div class="progress-container">
                            <div class="progress-bar mem-bar"></div>
                        </div>
                        <span class="stat-value mem-value">0/0 GB</span>
                    </div>

                    <div id="disks-container">
                        <!-- Disk rows will be injected here -->
                    </div>

                    <!-- IO Stats -->
                    <div class="stat-row io-disk-row">
                        <span class="stat-label">
                            <svg class="stat-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12,13A5,5 0 0,1 7,8H9V6H5V10H7A3,3 0 0,0 10,13V17H12V13M12,3A5,5 0 0,1 17,8H15V10H19V6H17A3,3 0 0,0 14,3V1H12V3Z"/></svg>
                            DISK IO
                        </span>
                        <div class="progress-spacer"></div>
                        <span class="stat-value io-disk-value">R: 0 B/s W: 0 B/s</span>
                    </div>
                    <div class="stat-row io-net-row">
                        <span class="stat-label">
                            <svg class="stat-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M11,7L8,10H10V17H12V10H14L11,7M2,6H8V4H2V6M2,10H6V8H2V10M20,4H10V6H20V4M20,10H16V8H20V10M2,14H8V12H2V14M2,18H6V16H2V18M20,12H10V14H20V12M20,18H16V16H20V18Z"/></svg>
                            NET IO
                        </span>
                        <div class="progress-spacer"></div>
                        <span class="stat-value io-net-value">↓ 0 B/s ↑ 0 B/s</span>
                    </div>

                    <!-- HA Stats -->
                    <div class="stat-row ha-only hidden" id="ha-row">
                        <span class="stat-label">
                            <svg class="stat-icon" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,7C13.4,7 14.8,8.1 14.8,9.5V11C15.4,11 16,11.6 16,12.2V15.8C16,16.4 15.4,17 14.8,17H9.2C8.6,17 8,16.4 8,15.8V12.2C8,11.6 8.6,11 9.2,11V9.5C9.2,8.1 10.6,7 12,7M12,8.2C11.3,8.2 10.8,8.8 10.8,9.5V11H13.2V9.5C13.2,8.8 12.7,8.2 12,8.2Z"/></svg>
                            HA
                        </span>
                        <div class="progress-spacer"></div>
                        <span class="stat-value ha-value">-</span>
                    </div>

                    <!-- Power Controls -->
                    <div class="power-controls">
                        <button class="power-btn b-start hidden" data-action="start" title="Start">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                        </button>
                        <button class="power-btn b-shutdown hidden" data-action="shutdown" title="Shutdown">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6V12H17V13.5H10.5V6H12Z"/></svg>
                        </button>
                        <button class="power-btn b-stop hidden" data-action="stop" title="Stop">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M18,18H6V6H18V18Z"/></svg>
                        </button>
                        <button class="power-btn b-reboot hidden" data-action="reboot" title="Reboot">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12,5V1L7,6L12,11V7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12H5A7,7 0 0,0 12,19A7,7 0 0,0 19,12A7,7 0 0,0 12,5Z"/></svg>
                        </button>
                        <div class="power-status hidden">Sending...</div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="popup.js"></script>
</body>
</html>
