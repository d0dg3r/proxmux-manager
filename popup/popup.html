<!DOCTYPE html>
<html>
<head>
    <title>ProxMux Manager</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../icons/icon48.png" alt="Logo" class="logo">
            <h1 data-i18n="extName">ProxMux Manager</h1>
        </div>
        <div class="header-actions">
            <button id="sidepanel-btn" title="Open Side Panel">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M19,19H5V5H19V19M17,17H12V7H17V17Z"/></svg>
            </button>
            <button id="settings-btn" data-i18n-title="settings">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.53,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.47,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
            </button>
        </div>
    </header>
    
    <main>
        <!-- Loading State -->
        <div id="loading" class="overlay">
            <div class="spinner"></div>
            <p data-i18n="connecting">Connecting to Proxmox...</p>
        </div>

        <!-- Not Authenticated State -->
        <div id="no-auth" class="overlay hidden">
            <h2 data-i18n="noAuthTitle">Welcome to ProxMux</h2>
            <p data-i18n="noAuthDesc">Please configure your API credentials to start managing your cluster.</p>
            <button id="open-settings-overlay" class="primary-btn" data-i18n="openSettings">Open Settings</button>
        </div>

        <div id="resource-list" class="list">
            <!-- Resources will be injected here -->
        </div>

        <!-- No more modal, we use options page instead -->
    </main>

    <template id="resource-item-template">
        <div class="resource-item">
            <div class="status-indicator"></div>
            <div class="info">
                <span class="name"></span>
                <span class="node"></span>
                <div class="meta-tags">
                    <span class="tag os hidden"></span>
                    <span class="tag ip hidden"></span>
                </div>
            </div>
            <div class="actions">
                <button class="action-btn novnc" title="Open noVNC Console">noVNC</button>
                <button class="action-btn spice hidden" title="Download SPICE .vv file">SPICE</button>
                <button class="action-btn ssh hidden" title="Connect via SSH">SSH</button>
                <button class="action-btn shell hidden" title="Open Shell">Shell</button>
            </div>
        </div>
    </template>

    <script type="module" src="popup.js"></script>
</body>
</html>
