<!DOCTYPE html>
<html>
<head>
    <title>ProxMux Manager</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../icons/icon48.png" alt="Logo" class="logo">
            <h1>ProxMux</h1>
        </div>
        <div class="header-actions">
            <button id="sidepanel-btn" title="Open in Side Panel">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19,3H5C3.89,3 3,3.89 3,5V19C3,20.11 3.89,21 5,21H19C20.11,21 21,20.11 21,19V5C21,3.89 20.11,3 19,3M19,19H5V5H19V19M17,7H7V9H17V7M17,11H7V13H17V11M15,15H7V17H15V15Z"/></svg>
            </button>
            <button id="settings-btn" title="Settings">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.12L14.47,2.44C14.44,2.21 14.24,2.05 14,2.05H10C9.76,2.05 9.56,2.21 9.53,2.44L9.14,5.12C8.53,5.34 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.66 9.14,18.88L9.53,21.56C9.56,21.79 9.76,21.95 10,21.95H14C14.24,21.95 14.44,21.79 14.47,21.56L14.86,18.88C15.47,18.66 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
            </button>
        </div>
    </header>
    
    <main>
        <div id="loading" class="overlay">
            <div class="spinner"></div>
            <p>Scanning Cluster...</p>
        </div>
        
        <div id="no-auth" class="overlay hidden">
            <p>Please configure your API credentials in settings.</p>
            <button id="open-settings-overlay">Open Settings</button>
        </div>

        <div id="resource-list" class="list">
            <!-- Resources will be injected here -->
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="proxmox-url">Proxmox URL</label>
                        <input type="text" id="proxmox-url" placeholder="https://192.168.1.100:8006">
                    </div>
                    <div class="form-group">
                        <label for="api-user">API User & Realm</label>
                        <input type="text" id="api-user" placeholder="root@pam">
                    </div>
                    <div class="form-group">
                        <label for="api-tokenid">Token ID</label>
                        <input type="text" id="api-tokenid" placeholder="my-token">
                    </div>
                    <div class="form-group">
                        <label for="api-secret">API Secret</label>
                        <div class="input-with-icon">
                            <input type="password" id="api-secret" placeholder="Secret Value">
                            <button id="toggle-secret" class="icon-btn" title="Toggle Visibility">
                                <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg>
                            </button>
                        </div>
                    </div>
                    <button id="save-settings-btn" class="primary-btn">Save Settings</button>
                    <div id="save-status"></div>
                </div>
            </div>
        </div>
    </main>

    <template id="resource-item-template">
        <div class="resource-item">
            <div class="status-indicator"></div>
            <div class="info">
                <span class="name"></span>
                <span class="node"></span>
                <div class="meta-tags">
                    <span class="tag os hidden"></span>
                    <span class="tag ip hidden"></span>
                </div>
            </div>
            <div class="actions">
                <button class="action-btn novnc" title="Open noVNC Console">noVNC</button>
                <button class="action-btn spice hidden" title="Download SPICE .vv file">SPICE</button>
                <button class="action-btn ssh hidden" title="Connect via SSH">SSH</button>
                <button class="action-btn shell hidden" title="Open Shell">Shell</button>
            </div>
        </div>
    </template>

    <script type="module" src="popup.js"></script>
</body>
</html>
